# This workflow will install Python dependencies, run tests, audit dependencies, lint code, check static types, and validate data mappers.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install ruff bandit pip-audit mypy pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint and Format Check with Ruff
      run: |
        ruff check .
        ruff format --check .
    - name: Security scan with Bandit
      run: |
        # scan code for common security bugs
        bandit -r . -x ./.venv,./tests --severity-level medium -s B608,B324
    - name: Audit dependencies with pip-audit
      run: |
        # check requirements for known vulnerability CVEs
        pip-audit -r requirements.txt
    - name: Type check with mypy
      run: |
        # enforce static type annotations
        mypy --ignore-missing-imports --explicit-package-bases .
    - name: Test with pytest
      run: |
        if ls test_*.py tests/*.py 1> /dev/null 2>&1; then
        pytest
        else
        echo "No tests found. Skipping pytest."
        fi
    - name: Validate Mock Data Generation and Ingest
      run: |
        # ensure mappers and generation logic runs cleanly
        python generate_all_mock_data.py --num-assets 5
        python executive_pdf_report.py --platform alation --input alation/sample_alation_metadata.json
